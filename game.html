<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>In 3:00 AM a gay-invasion!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(145deg, #0b001a, #1a0033);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        #game {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(8px);
            border: 2px solid #ff3b9b;
            border-radius: 40px;
            padding: 20px 16px 28px;
            box-shadow: 0 0 60px rgba(255, 59, 155, 0.3), inset 0 0 80px rgba(255, 59, 155, 0.05);
            color: #f0e6ff;
            transition: all 0.2s;
        }

        h1 {
            font-size: 18px;
            text-align: center;
            color: #ff6bcb;
            text-shadow: 0 0 20px #ff3b9b;
            letter-spacing: 2px;
            margin-bottom: 12px;
            word-break: break-word;
        }

        #time {
            background: #1a0033;
            border-radius: 60px;
            padding: 6px 14px;
            font-size: 16px;
            font-weight: bold;
            color: #ffb3e6;
            border: 1px solid #ff3b9b;
            display: inline-block;
            margin-bottom: 8px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            gap: 6px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            padding: 10px 12px;
            margin: 6px 0 12px;
            border: 1px solid #3f1a4b;
            font-size: 14px;
            flex-wrap: wrap;
        }

        .stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .bar {
            height: 10px;
            background: #2a0a33;
            border-radius: 20px;
            overflow: hidden;
            margin: 4px 0 10px;
            border: 1px solid #4a1a5a;
        }

        .bar-fill {
            height: 100%;
            width: 100%;
            border-radius: 20px;
            transition: width 0.3s ease;
        }

        .hp-fill { background: linear-gradient(90deg, #ff3b9b, #ff6bcb); }
        .shield-fill { background: linear-gradient(90deg, #3b8aff, #6bcbff); }

        #log {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 14px 12px;
            min-height: 80px;
            max-height: 120px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.5;
            border: 1px solid #3a1a4a;
            margin: 8px 0 12px;
            scroll-behavior: smooth;
        }

        #log::-webkit-scrollbar { width: 4px; }
        #log::-webkit-scrollbar-thumb { background: #ff3b9b; border-radius: 10px; }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 8px;
        }

        .btn {
            background: #1f0a2f;
            border: 2px solid #4a1a5a;
            border-radius: 30px;
            padding: 14px 6px;
            font-size: 15px;
            font-weight: bold;
            color: #f0e6ff;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 4px 0 #0f001a;
            text-align: center;
            line-height: 1.2;
            -webkit-touch-callout: none;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #0f001a;
        }

        .btn-attack { background: #ff1a6b; border-color: #ff6bcb; }
        .btn-shield { background: #1a5aff; border-color: #6bcbff; }
        .btn-heal { background: #2a8a3a; border-color: #6bff8b; }

        .btn:disabled {
            opacity: 0.3;
            transform: translateY(4px);
            box-shadow: 0 0px 0 #0f001a;
            pointer-events: none;
        }

        #reset {
            margin-top: 14px;
            background: #3a1a4a;
            border: 1px solid #ff3b9b;
            border-radius: 40px;
            padding: 12px;
            width: 100%;
            color: #ffb3e6;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }

        #reset:active {
            background: #ff3b9b;
            color: #0b001a;
        }

        .enemy-name {
            color: #ffb3e6;
            font-weight: bold;
            font-size: 15px;
            background: #1f0a2f;
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-block;
            border: 1px solid #ff3b9b;
            margin-bottom: 4px;
        }

        @media (max-width: 400px) {
            .btn { font-size: 13px; padding: 12px 4px; }
            .stats { font-size: 12px; }
            #log { font-size: 13px; min-height: 70px; }
        }
    </style>
</head>
<body>

<div id="game">
    <h1>🌈 IN 3:00 AM <br style="display:none;">A GAY-INVASION!</h1>

    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div id="time">🕒 3:00 AM</div>
        <div style="font-size:13px; background:#1a0033; padding:4px 14px; border-radius:40px; border:1px solid #ff3b9b;">
            Ход <span id="turnCounter">0</span>/15
        </div>
    </div>

    <div class="stats">
        <span>❤️ <span id="hpText">100</span></span>
        <span>🛡️ <span id="shieldText">50</span></span>
        <span>☕ <span id="coffeeText">3</span></span>
    </div>

    <div class="bar"><div class="bar-fill hp-fill" id="hpBar" style="width:100%"></div></div>
    <div class="bar"><div class="bar-fill shield-fill" id="shieldBar" style="width:100%"></div></div>

    <div id="log">🌙 Добро пожаловать! Держись до 5:00 AM...</div>

    <div class="btn-grid">
        <button class="btn btn-attack" id="attackBtn">💥 Атака</button>
        <button class="btn btn-shield" id="shieldBtn">🛡️ Щит +10</button>
        <button class="btn btn-heal" id="healBtn">☕ Кофе</button>
    </div>

    <button id="reset">🔄 Новая игра</button>
</div>

<script>
    // ==================== ИГРОВАЯ ЛОГИКА ====================
    const state = {
        hp: 100,
        maxHp: 100,
        shield: 50,
        maxShield: 100,
        coffee: 3,
        turn: 0,
        maxTurns: 15,
        gameOver: false,
        enemy: null,
        enemyHp: 0,
        enemyName: '',
        enemyDamage: 0,
        enemyAbility: '',
        isFighting: false
    };

    const enemyNames = ['Фламинго', 'Радужный Борец', 'Диско-Шар', 'Vogue-Мастер', 'Неоновый Хищник'];
    const abilities = ['Взрыв фламинго', 'Дождь блёсток', 'Удар каблуком', 'Смертельный твирк'];

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function pick(arr) { return arr[rand(0, arr.length - 1)]; }

    function spawnEnemy() {
        state.enemyName = pick(enemyNames);
        state.enemyHp = rand(20, 45);
        state.enemyDamage = rand(5, 16);
        state.enemyAbility = pick(abilities);
        state.isFighting = true;
        log(`💅 Вторжение! ${state.enemyName} (HP: ${state.enemyHp}) атакует с '${state.enemyAbility}'!`, 'enemy');
    }

    function updateUI() {
        document.getElementById('hpText').textContent = state.hp;
        document.getElementById('shieldText').textContent = state.shield;
        document.getElementById('coffeeText').textContent = state.coffee;
        document.getElementById('turnCounter').textContent = state.turn;

        document.getElementById('hpBar').style.width = Math.max(0, (state.hp / state.maxHp) * 100) + '%';
        document.getElementById('shieldBar').style.width = Math.max(0, (state.shield / state.maxShield) * 100) + '%';

        const min = 3 + Math.floor(state.turn / 60);
        const sec = state.turn % 60;
        document.getElementById('time').textContent = `🕒 ${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')} AM`;

        const attackBtn = document.getElementById('attackBtn');
        const shieldBtn = document.getElementById('shieldBtn');
        const healBtn = document.getElementById('healBtn');

        const disabled = state.gameOver || !state.isFighting;
        attackBtn.disabled = disabled;
        shieldBtn.disabled = disabled;
        healBtn.disabled = (state.coffee <= 0 || state.hp >= state.maxHp || state.gameOver || !state.isFighting);
    }

    function log(msg, type = 'normal') {
        const el = document.getElementById('log');
        const prefix = type === 'enemy' ? '💢 ' : '➡️ ';
        el.innerHTML += `<div>${prefix}${msg}</div>`;
        el.scrollTop = el.scrollHeight;
        if (el.children.length > 20) el.removeChild(el.firstChild);
    }

    function checkWin() {
        if (state.turn >= state.maxTurns && state.hp > 0) {
            state.gameOver = true;
            state.isFighting = false;
            log('🌅 РАССВЕТ! Вы выжили! Поздравляем! 🏆', 'normal');
            updateUI();
            return true;
        }
        if (state.hp <= 0) {
            state.gameOver = true;
            state.isFighting = false;
            state.hp = 0;
            log('💀 Вас унесли в мир грёз и неона... Игра окончена.', 'normal');
            updateUI();
            return true;
        }
        return false;
    }

    function enemyTurn() {
        if (state.gameOver || !state.isFighting) return;
        const dmg = rand(3, state.enemyDamage);
        let blocked = Math.min(state.shield, dmg);
        state.shield -= blocked;
        let remaining = dmg - blocked;
        state.hp = Math.max(0, state.hp - remaining);
        log(`${state.enemyName} бьёт вас на ${dmg} (щит поглотил ${blocked})`, 'enemy');
        updateUI();
        if (checkWin()) return;
        if (state.enemyHp <= 0) {
            state.isFighting = false;
            const heal = rand(8, 18);
            state.hp = Math.min(state.maxHp, state.hp + heal);
            log(`🌈 Повержен! Диско-энергия восстановила ${heal} HP`, 'normal');
            updateUI();
            if (checkWin()) return;
            // после победы над врагом — следующий ход
            endTurn();
        }
    }

    function endTurn() {
        if (state.gameOver) return;
        state.turn++;
        updateUI();
        if (checkWin()) return;

        // 70% шанс спавна
        if (Math.random() < 0.7 && !state.isFighting) {
            spawnEnemy();
        } else if (!state.isFighting) {
            log('😴 Тишина... пока что.', 'normal');
        }
        updateUI();
    }

    // ==================== ДЕЙСТВИЯ ИГРОКА ====================
    function playerAttack() {
        if (state.gameOver || !state.isFighting) return;
        const dmg = rand(10, 28);
        state.enemyHp -= dmg;
        log(`💥 Вы нанесли ${dmg} урона!`, 'normal');
        updateUI();

        if (state.enemyHp <= 0) {
            state.enemyHp = 0;
            state.isFighting = false;
            const heal = rand(8, 18);
            state.hp = Math.min(state.maxHp, state.hp + heal);
            log(`🌈 Повержен! Диско-энергия восстановила ${heal} HP`, 'normal');
            updateUI();
            if (checkWin()) return;
            endTurn();
        } else {
            // враг отвечает
            setTimeout(() => { enemyTurn(); }, 300);
        }
    }

    function playerShield() {
        if (state.gameOver || !state.isFighting) return;
        state.shield = Math.min(state.maxShield, state.shield + 10);
        log('🛡️ Щит усилен (+10)', 'normal');
        updateUI();
        // враг всё равно атакует
        setTimeout(() => { enemyTurn(); }, 300);
    }

    function playerHeal() {
        if (state.gameOver || !state.isFighting) return;
        if (state.coffee <= 0) { log('❌ Нет кофе!', 'normal'); return; }
        if (state.hp >= state.maxHp) { log('❤️ HP полное!', 'normal'); return; }
        state.hp = Math.min(state.maxHp, state.hp + 25);
        state.coffee--;
        log('☕ Выпили кофе (+25 HP)', 'normal');
        updateUI();
        setTimeout(() => { enemyTurn(); }, 300);
    }

    // ==================== НОВАЯ ИГРА ====================
    function resetGame() {
        state.hp = 100;
        state.maxHp = 100;
        state.shield = 50;
        state.maxShield = 100;
        state.coffee = 3;
        state.turn = 0;
        state.gameOver = false;
        state.isFighting = false;
        state.enemy = null;
        state.enemyHp = 0;
        document.getElementById('log').innerHTML = '🌙 Новая игра! Держись до 5:00 AM...';
        updateUI();
        // первый спавн с задержкой
        setTimeout(() => {
            if (!state.gameOver && !state.isFighting) {
                spawnEnemy();
                updateUI();
            }
        }, 500);
    }

    // ==================== ПОДКЛЮЧЕНИЕ КНОПОК ====================
    document.getElementById('attackBtn').addEventListener('click', playerAttack);
    document.getElementById('shieldBtn').addEventListener('click', playerShield);
    document.getElementById('healBtn').addEventListener('click', playerHeal);
    document.getElementById('reset').addEventListener('click', resetGame);

    // ==================== СТАРТ ====================
    resetGame();

    // Авто-переход хода, если враг мёртв (страховка)
    setInterval(() => {
        if (!state.gameOver && !state.isFighting && state.turn < state.maxTurns) {
            // если нет врага и не конец игры — спавним
            if (Math.random() < 0.5) {
                spawnEnemy();
                updateUI();
            }
        }
    }, 2000);

</script>
</body>
</html>
